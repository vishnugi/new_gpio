<!DOCTYPE html>
<html>
<head>
    <title>GPIO - Real-Time Sensor Dashboard</title>
    <style>
        body { font-family: Arial; text-align: center; }
        table { margin: auto; border-collapse: collapse; width: 80%; }
        th, td { padding: 10px; border: 1px solid black; }
        th { background-color: #4CAF50; color: white; }
    </style>
</head>
<body>

<h2>GPIO - Real-Time Temperature & Humidity Monitoring</h2>

<table id="data-table">
    <tr>
        <th>ID</th>
        <th>Device</th>
        <th>Temperature</th>
        <th>Humidity</th>
        <th>Timestamp</th>
    </tr>
</table>

<script>
function fetchData() {
    fetch("/api/data")
        .then(response => response.json())
        .then(data => {
            let table = document.getElementById("data-table");

            let rows = `
                <tr>
                    <th>ID</th>
                    <th>Device</th>
                    <th>Temperature</th>
                    <th>Humidity</th>
                    <th>Timestamp</th>
                </tr>
            `;

            data.forEach(row => {
                rows += `
                    <tr>
                        <td>${row.id}</td>
                        <td>${row.device_id}</td>
                        <td>${row.temperature} °C</td>
                        <td>${row.humidity} %</td>
                        <td>${row.timestamp}</td>
                    </tr>
                `;
            });

            table.innerHTML = rows;
        });
}

setInterval(fetchData, 5000);
fetchData();
</script>

</body>
</html>
