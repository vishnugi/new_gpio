name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: gpio_monitoring
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DB_HOST: 127.0.0.1
      DB_USER: root
      DB_PASSWORD: root
      DB_NAME: gpio_monitoring

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Wait for MySQL
        run: |
          python - <<'PY'
          import time
          import mysql.connector

          for i in range(30):
              try:
                  conn = mysql.connector.connect(
                      host='127.0.0.1',
                      user='root',
                      password='root',
                      database='gpio_monitoring',
                  )
                  conn.close()
                  print('MySQL is ready')
                  break
              except Exception as exc:
                  if i == 29:
                      raise
                  print(f'Waiting for MySQL... {exc}')
                  time.sleep(2)
          PY

      - name: Run tests
        run: pytest -q --cov=. --cov-report=term-missing
